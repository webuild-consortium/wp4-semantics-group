                }
              ]
            },
            "validUntil": "2029-12-03T12:19:52Z",
            "validFrom": "2019-12-03T12:19:52Z",
            "issuer": "did:key:$publicKeyOfIssuer$"
          }

  - id: EuccPartnership
    label: European Company Certificate Data for partnerships
    upper_value: cred:CredentialSubject
    defined_by: https:/w3id.org/ebwv/terminology#/concept/euccpartnership
