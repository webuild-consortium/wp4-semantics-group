datatype:
  - id: AccountType
    label: account type
    upper_value: xsd:string
    comment: list of account types TBD

  - id: CountryCode
    label: Country Code
    upper_value: xsd:string
    pattern: '[A-Z]{2}(-.*)?'
    comment: 2 letter country code according to ISO-3166
    defined_by: https://www.iso.org/iso-3166-country-codes.html

  - id: Bic
    label: Business Identifier Code aka Swift Code
    upper_value: xsd:string
    pattern: '[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})'
    comment: International code (i.e. BIC or SWIFT code), as defined in ISO 9362, of the financial institution
    defined_by: https://www.iso.org/standard/84108.html

  - id: ClearingNumber
    label: ClearingNumber
    upper_value: xsd:string
    comment: Clearing number, only used in some countries, of the identification of the financial institution.

  - id: Currency
    label: Currency
    upper_value: xsd:string
    pattern: '[A-Z]{3}'
    comment: 3 letter currency code according to the European controlled vocabulary 'Currency'
    defined_by:
      - https://op.europa.eu/en/web/eu-vocabularies/concept-scheme/-/resource?uri=http://publications.europa.eu/resource/authority/currency
      - http://publications.europa.eu/resource/authority/currency

  - id: Eori
    label: economic operator registration and identification
    upper_value: xsd:string
    defined_by: https://sanastot.suomi.fi/en/terminology/webuild/concept/eori

  - id: Euid
    label: EUID
    upper_value: xsd:string
    defined_by: https://sanastot.suomi.fi/en/terminology/webuild/concept/euid

  - id: Excise
    label: excise number
    upper_value: xsd:string
    defined_by: https://sanastot.suomi.fi/en/terminology/webuild/concept/excise

  - id: Iban
    label: IBAN
    upper_value: xsd:string
    pattern: '[A-Z]{2}[0-9A-Z]{13,30}'
    comment: IBAN as defined by ISO 13616:2020
    defined_by:
      - https://www.iso.org/standard/81090.html

  - id: Lei
    label: legal entity identifier
    upper_value: xsd:string
    defined_by: https://sanastot.suomi.fi/en/terminology/webuild/concept/lei

  - id: Nace21
    label: Nace Rev. 2.1
    upper_value: xsd:string
    comment: notation of the main activity of the company according to the European controlled vocabulary 'Nace Rev. 2.1'
    defined_by:
      - https://op.europa.eu/en/web/eu-vocabularies/concept-scheme/-/resource?uri=http://data.europa.eu/ux2/nace2.1/nace2.1
      - http://data.europa.eu/ux2/nace2.1/nace2.1

  - id: NationalBankCode
    label: National Bank Code
    upper_value: xsd:string
    comment: Country-specific code for e.g. internal routing within a specific country’s clearing system (e.g. BLZ, Sort Code)

  - id: PublicBodyId
    label: unique identifier of public body
    upper_value: xsd:string
    defined_by: https://sanastot.suomi.fi/en/terminology/webuild/concept/publicBodyId

  - id: Tin
    label: tax reference number
    upper_value: xsd:string
    defined_by: https://sanastot.suomi.fi/en/terminology/webuild/concept/tin

  - id: VatId
    label: unique vat identifier
    upper_value: xsd:string
    defined_by: https://sanastot.suomi.fi/en/terminology/webuild/concept/vatid
