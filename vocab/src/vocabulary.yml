            ],
            "attestationLegalCategory": "QEAA",
            "credentialSubject": {
              "@id": "did:key:$publicKeyOfHolder$",
              "@type": "EuropeanBusinessWalletOwnerId",
              "legalIdentifier": {
                "@type" : "Euid",
                "@value" : "NOFOR.987654321"
              },
              "legalName": "acme Corporation"
            },
            "validUntil": "2029-12-03T12:19:52Z",
            "validFrom": "2019-12-03T12:19:52Z",
            "issuer": "did:key:$publicKeyOfIssuer$"
          }

  - id: GeneralPartner
    label: General Partner
    defined_by: https:/w3id.org/ebwv/terminology#/concept/generalpartner

  - id: LegalPersonIdentificationData
    label: Legal Person Identification Data
    upper_value: cred:CredentialSubject
    defined_by: https:/w3id.org/ebwv/terminology#/concept/legalpersonidentificationdata
    example:
      - label: Credential with credential subject of type LegalPersonIdentificationData
        json: |
          {
            "@context": [
              "https://www.w3.org/ns/credentials/v2",
              "https:/w3id.org/ebwv/v0.1"
            ],
            "@id": "urn:uuid:8c076e09-c680-4fa0-b346-630096770c3e",
            "@type": [
              "VerifiableCredential",
