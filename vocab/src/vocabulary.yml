vocab:
  - id: ebwv
    value: https://w3id.org/ebwv#
    context: https://w3id.org/ebwv/v0.1

prefix:
  - id: schema
    value: http://schema.org/

  - id: jsonld
    value: http://www.w3.org/ns/json-ld#

  - id: cred
    value: https://w3.org/2018/credentials#

  - id: skos
    value: http://www.w3.org/2004/02/skos/core#

ontology:
  - property: dc:title
    value: European Business Wallet Vocabulary v0.1

  - property: dc:description
    value: Vocabulary used by the Verifiable Credentials of the European Business Wallet Framework

  - property: rdfs:seeAlso
    value: https://webuild-consortium.github.io/wp4-semantics-group/ebwv

class:
  - id: Address
    label: Address
    defined_by: https:/w3id.org/ebwv/terminology#/concept/address

  - id: Agent
    label: Agent
    defined_by: https:/w3id.org/ebwv/terminology#/concept/agent

  - id: AttestationLegalCategory
    label: Attestation Legal Category
    defined_by: https:/w3id.org/ebwv/terminology#/concept/attestationlegalcategory

  - id: Capital
    label: Capital
    defined_by: https:/w3id.org/ebwv/terminology#/concept/capital

  - id: ContactPoint
    label: Contact Point
    defined_by: https:/w3id.org/ebwv/terminology#/concept/contactpoint

  - id: cred:CredentialSubject
    label: Credential Subject
    defined_by: https://w3.org/TR/vc-data-model-2.0/#credential-subject

  - id: ElectronicAttestationOfAttributes
    label: Electronic Attestation Of Attributes
    upper_value: cred:VerifiableCredential
    defined_by: https:/w3id.org/ebwv/terminology#/concept/electronicattestationofattributes

  - id: EuccLimitLiabilityCompany
