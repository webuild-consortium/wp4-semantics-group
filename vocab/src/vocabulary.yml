            ],
            "attestationLegalCategory": "QEAA",
            "credentialSubject": {
              "@id": "did:key:$publicKeyOfHolder$",
              "@type": "LegalPersonIdentificationData",
              "legalIdentifier": {
                "@type" : "Euid",
                "@value" : "NOFOR.987654321"
              },
              "legalName": "acme Corporation",
              "registeredAddress": {
                "@type":"Address",
                "fullAddress": "Via Appia 123, 00100 Rome, Italy",
                "thoroughfare": "Via Appia",
                "locatorDesignator": "123",
                "postName": "Rome",
                "adminUnitL2": "Lazio",
                "postCode": "00100",
                "adminUnitL1": "IT"
              },
              "vat": "123456789MVA",
              "tin": "NO-ORG-123456789",
              "lei": "5493001KJTIIGC8Y1R12",
              "eori": "NO123456789012",
              "excise": "GBWK123456789000"

            },
            "validUntil": "2029-12-03T12:19:52Z",
            "validFrom": "2019-12-03T12:19:52Z",
            "issuer": "did:key:$publicKeyOfIssuer$"
          }

  - id: LegalRepresentative
    label: Legal representative
    defined_by: https:/w3id.org/ebwv/terminology#/concept/legalrepresentative

  - id: LimitedPartner
    label: Limited Partner
    defined_by: https:/w3id.org/ebwv/terminology#/concept/limitedpartner

  - id: Location
    label: Location
    defined_by: https:/w3id.org/ebwv/terminology#/concept/location

  - id: NaturalPersonIdentificationData
    label: Natural Person Identification Data
    upper_value: cred:CredentialSubject
    defined_by: https:/w3id.org/ebwv/terminology#/concept/naturalpersonidentificationdata
    example:
      - label: Credential with credential subject of type NaturalPersonIdentificationData
        json: |
          {
            "@context": [
              "https://www.w3.org/ns/credentials/v2",
              "https:/w3id.org/ebwv/v0.1"
            ],
            "@id": "urn:uuid:06aeb5bc-e4a1-46a5-920e-d15eaba7f35c",
            "@type": [
              "VerifiableCredential",
              "ElectronicAttestationOfAttributes"
            ],
            "attestationLegalCategory": "QEAA",
            "credentialSubject": {
              "@id": "did:key:$publicKeyOfHolder$",
              "@type": "NaturalPersonIdentificationData",
              "givenName": "Mario",
              "familyName": "Mustermann",
              "birthDate": "12/01/1965"
            },
            "validUntil": "2029-12-03T12:19:52Z",
            "validFrom": "2019-12-03T12:19:52Z",
            "issuer": "did:key:$publicKeyOfIssuer$"
          }

  - id: PeriodOfTime
    label: Period of Time
    defined_by: https:/w3id.org/ebwv/terminology#/concept/periodoftime

  - id: Person
    label: Person
    defined_by: https:/w3id.org/ebwv/terminology#/concept/person

  - id: PublicBodyId
    label: unique identifier of public body
    defined_by: https:/w3id.org/ebwv/terminology#/concept/publicBodyId

  - id: ScopeOfAuthorization
    label: Scope Of Authorization
    defined_by: https:/w3id.org/ebwv/terminology#/concept/scopeofauthorization

  - id: StatutoryPartner
    label: Statutory Partner
    defined_by: https:/w3id.org/ebwv/terminology#/concept/statutorypartner

property:
  - id: activity
    label: main activity of company
    domain:
      - EuccLimitLiabilityCompany
      - EuccPartnership
    range:
      - Nace21
    defined_by: https:/w3id.org/ebwv/terminology#/concept/activity

  - id: addressArea
    label: address area
    domain: Address
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/addressarea

  - id: adminUnitL2
    label: administrative unit level 2
    domain: Address
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/adminUnitL2

  - id: adminUnitL1
    label: administrative unit level 1
    domain: Address
    range: CountryCode
    defined_by: https:/w3id.org/ebwv/terminology#/concept/adminUnitL1

  - id: alternativeName
    label: alternative name
    domain: Person
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/alternativename

  - id: amount
    label: amount
    domain: Capital
    range: xsd:float
    defined_by: https:/w3id.org/ebwv/terminology#/concept/amount

  - id: attestationLegalCategory
    label: attestation legal category
    domain: ElectronicAttestationOfAttributes
    range: AttestationLegalCategory
    one_of: [ QEAA, Pub-EAA, EAA ]
    defined_by: https:/w3id.org/ebwv/terminology#/concept/attestationlegalcategory

  - id: birthName
    label: birth name
    domain: Person
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/birthname

  - id: citizenship
    label: citizenship
    domain: Person
    range: CountryCode
    defined_by: https:/w3id.org/ebwv/terminology#/concept/citizenship

  - id: companyStatus
    label: status of the company
    domain:
      - EuccLimitLiabilityCompany
      - EuccPartnership
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/companyStatus

  - id: contactPoint
    label: contact point
    domain: Person
    range: ContactPoint
    defined_by: https:/w3id.org/ebwv/terminology#/concept/contactpoint

  - id: correspondenceAddress
    label: correspondence Address
    domain:
      - LegalPersonIdentificationData
      - EuccLimitLiabilityCompany
      - EuccPartnership
    range:
      - Address
    defined_by: https:/w3id.org/ebwv/terminology#/concept/correspondenceaddress

  - id: countryOfBirth
    label: country of birth
    domain: Person
    range: Location
    defined_by: https:/w3id.org/ebwv/terminology#/concept/countryofbirth

  - id: countryOfDeath
    label: country of death
    domain: Person
    range: Location
    defined_by: https:/w3id.org/ebwv/terminology#/concept/countryofdeath

  - id: currency
    label: currency
    domain: Capital
    range: Currency
    defined_by: https:/w3id.org/ebwv/terminology#/concept/currency

  - id: dateOfBirth
    label: date of birth
    domain:
      -  Person
      -  NaturalPersonIdentificationData
    range: xsd:date
    defined_by: https:/w3id.org/ebwv/terminology#/concept/dateofbirth

  - id: dateOfDeath
    label: date of death
    domain: Person
    range: xsd:date
    defined_by: https:/w3id.org/ebwv/terminology#/concept/dateofdeath

  - id: dateOfRegistration
    label: date of registration
    domain:
      - EuccLimitLiabilityCompany
      - EuccPartnership
    range: xsd:date
    defined_by: https:/w3id.org/ebwv/terminology#/concept/dateofregistration

  - id: domicile
    label: domicile
    domain: Person
    range: Address
    defined_by: https:/w3id.org/ebwv/terminology#/concept/domicile

  - id: eori
    label: economic operator registration and identification
    domain: LegalPersonIdentificationData
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/eori

  - id: excise
    label: excise number
    domain: LegalPersonIdentificationData
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/excise

  - id: familyName
    label: family name
    domain: NaturalPersonIdentificationData
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/familyname

  - id: fullAddress
    label: full address
    domain: Address
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/fulladdress

  - id: fullName
    label: full name
    domain: Person
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/fullname

  - id: gender
    label: gender
    domain: Person
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/gender

  - id: givenName
    label: given name
    domain: NaturalPersonIdentificationData
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/givenname

  - id: hasEmail
    label: email
    domain: ContactPoint
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/email

  - id: hasTelephone
    label: telephone
    domain: ContactPoint
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/telephone

  - id: identifier
    label: identifier
    domain: Person
    range: Identifier
    defined_by: https:/w3id.org/ebwv/terminology#/concept/identifier

  - id: legalName
    label: legal name
    domain:
      - LegalPersonIdentificationData
      - EuropeanBusinessWalletOwnerId
      - EuccLimitLiabilityCompany
      - EuccPartnership
    range: xsd:string
    comment: a name under which the legal entity is registered
    defined_by: https:/w3id.org/ebwv/terminology#/concept/legalname

  - id: legalIdentifier
    label: legal identifier
    domain:
      - LegalPersonIdentificationData
      - EuropeanBusinessWalletOwnerId
      - EuccLimitLiabilityCompany
      - EuccPartnership
    range:
      - PublicBodyId
      - Euid
    defined_by: https:/w3id.org/ebwv/terminology#/concept/legalidentifier

  - id: legalRepresentative
    label: legal representative
    domain:
      - EuccLimitLiabilityCompany
    range:
      - LegalRepresentative
    defined_by: https:/w3id.org/ebwv/terminology#/concept/legalrepresentative

  - id: legalRepresentativeId
    label: unique ID of the identity of the representative
    domain: LegalRepresentative
    range: xsd:anyURI
    defined_by: https:/w3id.org/ebwv/terminology#/concept/legalrepresentativeid

  - id: lei
    label: legal entity identifier
    domain: LegalPersonIdentificationData
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/lei

  - id: liabilityOrContribution
    label: liability or contribution of the limited partner
    domain: LimitedPartner
    range: Capital
    defined_by: https:/w3id.org/ebwv/terminology#/concept/liabilityorcontribution

  - id: locatorDesignator
    label: locator designator
    domain: Address
    range:
      - xsd:string
      - xsd:integer
    defined_by: https:/w3id.org/ebwv/terminology#/concept/locatordesignator

  - id: locatorName
    label: locator name
    domain: Address
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/locatorname

  - id: matronymicName
    label: matronymic name
    domain: Person
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/matronymicname

  - id: partner
    label: partner
    domain: EuccPartnership
    range:
      - GeneralPartner
      - LimitedPartner
      - StatutoryPartner
    defined_by: https:/w3id.org/ebwv/terminology#/concept/partner

  - id: partnerId
    label: unique ID of the identity of the partner
    domain:
      - GeneralPartner
      - LimitedPartner
      - StatutoryPartner
    range: xsd:anyURI
    defined_by: https:/w3id.org/ebwv/terminology#/concept/partnerid

  - id: patronymicName
    label: patronymic name
    domain: Person
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/patronymicname

  - id: personalAdministrativeNumber
    label: personalAdministrativeNumber
    domain: Person
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/personaladministrativenumber

  - id: placeOfBirth
    label: place of birth
    domain: Person
    range: Location
    defined_by: https:/w3id.org/ebwv/terminology#/concept/placeofbirth

  - id: placeOfDeath
    label: place of death
    domain: Person
    range: Location
    defined_by: https:/w3id.org/ebwv/terminology#/concept/placeofdeath

  - id: poBox
    label: post office box
    domain: Address
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/pobox

  - id: portrait
    label: portrait
    domain: Person
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/portrait

  - id: postCode
    label: post code
    domain: Address
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/postcode

  - id: postName
    label: post name
    domain: Address
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/postname

  - id: registeredAddress
    label: registered address
    domain:
      - LegalPersonIdentificationData
      - EuccLimitLiabilityCompany
      - EuccPartnership
    range:
      - Address
    defined_by: https:/w3id.org/ebwv/terminology#/concept/registeredaddress

  - id: residency
    label: residency
    domain: Person
    range: CountryCode
    defined_by: https:/w3id.org/ebwv/terminology#/concept/residency

  - id: role
    label: role of representative
    domain:
      - LegalRepresentative
      - StatutoryPartner
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/role

  - id: scopeOfAuthorization
    label: scope of authorization (alone or jointly)
    domain:
      - LegalRepresentative
      - StatutoryPartner
    range: ScopeOfAuthorization
    one_of: [Alone, Jointly]
    defined_by: https:/w3id.org/ebwv/terminology#/concept/role

  - id: subscribedCapital
    label: subscribed capital
    domain:
      - EuccLimitLiabilityCompany
    range: Capital
    defined_by: https:/w3id.org/ebwv/terminology#/concept/subscribedcapital

  - id: thoroughfare
    label: thoroughfare
    domain: Address
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/thoroughfare

  - id: tin
    label: tax reference number
    domain: LegalPersonIdentificationData
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/tin

  - id: vat
    label: value added tax id
    domain: LegalPersonIdentificationData
    range: xsd:string
    defined_by: https:/w3id.org/ebwv/terminology#/concept/vat

individual:   # code lists
  - id: Alone
    label: scope of authorization Alone
    type: ScopeOfAuthorization
    defined_by: https:/w3id.org/ebwv/terminology#/concept/Alone

  - id: EAA
    label: electronic attestation of attributes
    type: AttestationLegalCategory
    defined_by: https:/w3id.org/ebwv/terminology#/concept/EAA

  - id: Jointly
    label: scope of authorization Jointly
    type: ScopeOfAuthorization
    defined_by: https:/w3id.org/ebwv/terminology#/concept/Jointly

  - id: Pub-EAA
    label: public electronic attestation of attributes
    type: AttestationLegalCategory
    defined_by: https:/w3id.org/ebwv/terminology#/concept/Pub-EAA

  - id: QEAA
    label: qualified electronic attestation of attributes
    type: AttestationLegalCategory
    defined_by: https:/w3id.org/ebwv/terminology#/concept/QEAA

datatype:
  - id: Currency
    label: Currency
    upper_value: xsd:string
    pattern: '[A-Z]{3}'
    comment: 3 letter currency code according to the European controlled vocabulary 'Currency'
