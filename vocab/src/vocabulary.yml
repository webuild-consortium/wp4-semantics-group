      - label: Credential with credential subject of type EuccPartnership
        json: |
          {
            "@context": [
              "https://www.w3.org/ns/credentials/v2",
              "https:/w3id.org/ebwv/v0.1"
            ],
            "@id": "urn:d5dfeb39-edc7-40b1-a2fc-3968dbd3eac8",
            "@type": [
              "VerifiableCredential",
              "ElectronicAttestationOfAttributes"
            ],
            "attestationLegalCategory": "QEAA",
            "credentialSubject": {
              "@id": "did:key:$publicKeyOfHolder$",
              "@type": "EuccPartnership",
              "legalIdentifier": {
                "@type" : "Euid",
                "@value" : "NOFOR.987654321"
              },
              "legalName": "acme Partnership",
              "registeredAddress": {
                "@type":"Address",
                "fullAddress": "Via Appia 123, 00100 Rome, Italy",
                "thoroughfare": "Via Appia",
                "locatorDesignator": "123",
                "postName": "Rome",
                "adminUnitL2": "Lazio",
                "postCode": "00100",
                "adminUnitL1": "IT"
              },
              "correspondenceAddress": {
                "@type":"Address",
                "fullAddress": "Via Appia 123, 00100 Rome, Italy",
                "thoroughfare": "Via Appia",
                "locatorDesignator": "123",
                "postName": "Rome",
                "adminUnitL2": "Lazio",
                "postCode": "00100",
                "adminUnitL1": "IT"
              },
              "dateOfRegistration": "2023-10-11",
              "companyStatus": "active",
              "activity": 1082,
              "partner": [
                {
                  "@type": "GeneralPartner",
                  "partnerId": "did:key:$publicKeyOfPartner1$"
                },
                {
                  "@type": "LimitedPartner",
                  "partnerId": "did:key:$publicKeyOfPartner2$",
                  "liabilityOrContribution": {
                    "@type": "Capital",
                    "amount": 100000,
                    "currency": "EUR"
                  }
                },
                {
                  "@type": "StatutoryPartner",
                  "partnerId": "did:key:$publicKeyOfPartner3$",
                  "role": "Head of HR",
                  "scopeOfAuthorization": "Jointly"
                }
              ]
            },
            "validUntil": "2029-12-03T12:19:52Z",
            "validFrom": "2019-12-03T12:19:52Z",
            "issuer": "did:key:$publicKeyOfIssuer$"
          }

  - id: Euid
    label: EUID
    defined_by: https:/w3id.org/ebwv/terminology#/concept/euid

  - id: EuropeanBusinessWalletOwnerId
    label: European Business Wallet Owner ID
    upper_value: cred:CredentialSubject
    defined_by: https:/w3id.org/ebwv/terminology#/concept/europeanbusinesswalletownerid
    example:
      - label: Credential with credential subject of type EuropeanBusinessWalletOwnerId
        json: |
          {
            "@context": [
              "https://www.w3.org/ns/credentials/v2",
              "https:/w3id.org/ebwv/v0.1"
            ],
            "@id": "urn:uuid:f0adc5fe-3558-40f8-b1e2-97713ec44dff",
            "@type": [
              "VerifiableCredential",
