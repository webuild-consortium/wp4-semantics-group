      - label: Credential with credential subject of type EuccLimitLiabilityCompany
        json: |
          {
            "@context": [
              "https://www.w3.org/ns/credentials/v2",
              "https:/w3id.org/ebwv/v0.1"
            ],
            "@id": "urn:d5dfeb39-edc7-40b1-a2fc-3968dbd3eac8",
            "@type": [
              "VerifiableCredential",
              "ElectronicAttestationOfAttributes"
            ],
            "attestationLegalCategory": "QEAA",
            "credentialSubject": {
              "@id": "did:key:$publicKeyOfHolder$",
              "@type": "EuccLimitLiabilityCompany",
              "legalIdentifier": {
                "@type" : "Euid",
                "@value" : "NOFOR.987654321"
              },
              "legalName": "acme Corporation",
              "registeredAddress": {
                "@type":"Address",
                "fullAddress": "Via Appia 123, 00100 Rome, Italy",
                "thoroughfare": "Via Appia",
                "locatorDesignator": "123",
                "postName": "Rome",
                "adminUnitL2": "Lazio",
                "postCode": "00100",
                "adminUnitL1": "IT"
              },
              "correspondenceAddress": {
                "@type":"Address",
                "fullAddress": "Via Appia 123, 00100 Rome, Italy",
                "thoroughfare": "Via Appia",
                "locatorDesignator": "123",
                "postName": "Rome",
                "adminUnitL2": "Lazio",
                "postCode": "00100",
                "adminUnitL1": "IT"
              },
              "dateOfRegistration": "2023-10-11",
              "companyStatus": "active",
              "activity": 1082,
              "subscribedCapital": {
                "@type": "Capital",
                "amount": 100000,
                "currency": "EUR"
              },
              "legalRepresentative": [
                {
                  "@type": "LegalRepresentative",
                  "legalRepresentativeId": "did:key:$publicKeyOfRepresentative1$",
                  "role": "CEO",
                  "scopeOfAuthorization": "Alone"
                },
                {
                  "@type": "LegalRepresentative",
                  "legalRepresentativeId": "did:key:$publicKeyOfRepresentative2$",
